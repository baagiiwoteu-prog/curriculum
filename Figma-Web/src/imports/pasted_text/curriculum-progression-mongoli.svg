REQUIRED FLOW RELATIONSHIPS

Language flow
    •   Хэл яриа → Монгол хэл
    •   Монгол хэл → Монгол хэл
    •   Монгол хэл → Монгол бичиг
    •   Монгол хэл → Уран зохиол

This should be shown as a strong flow that expands at lower secondary.

Mathematics flow
    •   Математик → Математик → Математик

This should be a clean direct flow with no branching.

Science / environment flow
    •   Байгаль, нийгмийн орчин → Байгаль шинжлэл
    •   Байгаль шинжлэл → Биологи
    •   Байгаль шинжлэл → Физик
    •   Байгаль шинжлэл → Хими
    •   Байгаль шинжлэл → Газарзүй

This should be one of the most visually important branching flows.

Society / life orientation flow
    •   Байгаль, нийгмийн орчин → Нийгмийн ухаан
    •   Байгаль, нийгмийн орчин → Нийгэм ахуйн баримжаа
    •   Нийгэм-сэтгэл хөдөлөл → Эрүүл мэнд
    •   Нийгэм-сэтгэл хөдөлөл → Нийгэм ахуйн баримжаа
    •   Нийгэм-сэтгэл хөдөлөл → Нийгмийн ухаан as lighter / partial flow
    •   Нийгмийн ухаан → Нийгэм
    •   Нийгмийн ухаан → Түүх
    •   Нийгэм ахуйн баримжаа → Нийгэм as partial supporting flow
    •   Нийгэм ахуйн баримжаа → Эрүүл мэнд as lighter / indirect flow

This should show distributed continuity rather than neat one-to-one mapping.

Arts / design flow
    •   Зураг, урлал → Дүрслэх урлаг, дизайн
    •   Дүрслэх урлаг, дизайн → Дүрслэх урлаг
    •   Дүрслэх урлаг, дизайн → Дизайн технологи

Music flow
    •   Хөгжим → Хөгжим → Хөгжим

This can be a separate simple flow parallel to arts/design.

Physical / health flow
    •   Хөдөлгөөн, эрүүл мэнд → Биеийн тамир
    •   Хөдөлгөөн, эрүүл мэнд → Эрүүл мэнд
    •   Биеийн тамир → Биеийн тамир
    •   Эрүүл мэнд → Эрүүл мэнд

This should clearly show one early integrated domain splitting into two stable later subjects.

Digital flow
    •   Компьютерын ухаан → Компьютерын ухаан

Show this as beginning only at primary level, with no pre-primary predecessor.

Additional language flow
    •   Тува хэл → Тува хэл
    •   Казах хэл → Казах хэл

Show these as emerging in primary and continuing into lower secondary.

⸻

STRUCTURAL EMPHASIS

The most important thing is to visually highlight these three reform insights:

1. Integration to differentiation

Early subjects are broad and integrated; lower secondary subjects are more differentiated and disciplinary.

2. Branching

Some foundational domains split significantly over time, especially:
    •   language
    •   science
    •   arts/design
    •   physical/health

3. Distributed continuity

Socio-emotional and life-orientation dimensions do not remain as one subject; they are distributed across several later areas.

These insights should be visible from the flows themselves, not only from text.

⸻

ANNOTATIONS

Add 3–4 very subtle annotation labels near major branching points:
    •   expands
    •   differentiates
    •   splits
    •   distributed continuity

Keep these tiny and elegant. They should support interpretation without cluttering the visual.

⸻

LEGEND

Include a small legend in one corner:
    •   solid flow = direct continuation
    •   split flow = subject differentiation
    •   lighter / dashed flow = partial or indirect continuity
    •   no incoming flow = subject introduced later

Make the legend minimal and visually consistent with the rest of the design.

⸻

TYPOGRAPHY

Use a clean modern sans-serif.
The typography should be:
    •   strong but not heavy
    •   professional
    •   readable from presentation distance

Hierarchy:
    •   large bold title
    •   medium subtitle
    •   clear level headings
    •   small but readable node labels
    •   tiny unobtrusive annotation labels

⸻

BACKGROUND

Use a very light neutral background:
    •   off-white
    •   very pale gray
    •   soft paper tone

The background should feel like an analytical presentation document, not a web application.

⸻

COMPOSITION PRIORITIES

The final composition should:
    •   privilege flow over boxes
    •   privilege structure over decoration
    •   show progression clearly from left to right
    •   maintain whitespace
    •   avoid tangled overlapping connectors
    •   use elegant curve routing

The page should feel balanced, quiet, and highly intentional.

⸻

NEGATIVE INSTRUCTIONS

Do NOT create:
    •   three simple lists of subjects
    •   a dashboard layout
    •   a lane chart with arrows between boxes
    •   a generic flowchart
    •   oversized rounded pills
    •   tabbed website navigation
    •   a business analytics Sankey with numbers
    •   bright saturated colors
    •   cluttered crossing lines
    •   unnecessary icons or illustrations

This should be a policy-grade Sankey-inspired curriculum progression graphic.
