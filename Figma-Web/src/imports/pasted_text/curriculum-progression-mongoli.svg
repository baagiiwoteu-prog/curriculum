
Design a professional Sankey-style curriculum flow visualization for education reform discussion in Mongolia.

The visual should show how curriculum subjects progress across three education levels:
    1.  Surguuliin Umnuh Bolovsrol
    2.  Baga Bolovsrol
    3.  Suuri Bolovsrol

This is not a business dashboard, not a UI mockup, and not a process flowchart.
It must look like a curriculum architecture visualization with Sankey-like flows showing how broad early domains continue, split, and differentiate into later subjects.

The purpose is to support:
    •   curriculum reform dialogue
    •   ministry and technical working group discussions
    •   analytical interpretation of subject progression
    •   discussion of continuity from early childhood through lower secondary

⸻

CORE VISUAL IDEA

Create a Sankey-like flow map with:
    •   three vertical stages from left to right
    •   subject nodes at each level
    •   soft flowing bands or connectors between levels
    •   visible branching where one domain expands into multiple later subjects
    •   lighter or thinner flows for partial / indirect continuity
    •   a strong sense of movement from integrated early domains to differentiated later subjects

This must feel like a flow of curriculum architecture, not a list of boxes.

⸻

TITLE

Curriculum Subject Progression Across Education Levels

SUBTITLE

From integrated early domains to differentiated lower secondary subjects

⸻

DESIGN DIRECTION

Overall visual style

The visual should resemble a refined Sankey diagram for policy and education reform, not a technical engineering chart.

It should feel:
    •   elegant
    •   minimal
    •   analytical
    •   strategic
    •   policy-facing
    •   visually calm
    •   publication-quality

Avoid anything that feels like:
    •   a SaaS dashboard
    •   a wireframe
    •   a website interface
    •   a dense technical network map
    •   a decorative infographic

⸻

LAYOUT

Structure

Use a single widescreen 16:9 canvas.

Divide the page into three major vertical columns:

Left column

Surguuliin Umnuh Bolovsrol
Small descriptor underneath: Integrated developmental domains

Middle column

Baga Bolovsrol
Small descriptor underneath: Formalizing foundational subjects

Right column

Suuri Bolovsrol
Small descriptor underneath: Differentiated disciplinary subjects

Place nodes vertically in each column, but do not make them appear as rigid stacked cards. They should read as anchors for flows.

The main visual emphasis should be on the flow connections, not on the boxes.

⸻

VISUAL LANGUAGE

Nodes

Represent subjects as clean compact labels or small rounded rectangles with subtle fills or outlines.

Do not make them large pill-shaped bars.

Flows

Use Sankey-like curved bands or smooth flowing connectors between nodes.

The connectors should:
    •   widen or branch gently
    •   visually communicate continuity and splitting
    •   feel organic and fluid, not mechanical
    •   be readable and uncluttered

Weighting logic

This is not a quantitative Sankey chart with numeric values, but it should borrow the Sankey aesthetic:
    •   more important direct progressions can have slightly thicker flows
    •   partial or indirect continuities can have thinner or lighter flows
    •   distributed continuity can use dashed or semi-transparent flows

The visual should communicate qualitative structural relationships, not statistical volume.

⸻

COLOR SYSTEM

Use a restrained palette by broad domain family.

Suggested domain colors:
    •   Language and literacy = muted blue
    •   Mathematics = muted amber
    •   Science / environment = muted green
    •   Society / life orientation = muted violet
    •   Arts / music / design = muted rose
    •   Physical / health = muted teal
    •   Digital = slate gray
    •   Additional languages = muted gold

Apply the color mainly to the flows, with lighter node styling.

This is important:
The flow itself should carry much of the visual meaning.

Do not overfill the page with colored boxes.

